# Percentage of account value to use
max_account_usable = 50
time_zone = "Europe/London"
paper_trading = false
spin_interval = 300

# Path to the credentials file
credentials_filepath = "/Users/e1/Documents/equitiestradingbot/config/credentials/live_credentials.json"

# Path to Telegram credentials file
telegram_credentials_filepath = "/Users/e1/Documents/equitiestradingbot/config/credentials/telegrambot_credentials.json"

[telegram]
signal_window_hours = 1.0
signal_history_filepath = "/Users/e1/Documents/equitiestradingbot/config/telegram/signal_history.json"

[logging]
enable = true
log_filepath = "/Users/e1/Documents/equitiestradingbot/log/trading_bot_{timestamp}.log"
debug = true

[market_source]
active = "list"
values = ["list", "api", "watchlist"]

# Path to the epic IDs file
[market_source.epic_id_list]
filepath = "/Users/e1/Documents/equitiestradingbot/data/epics_ids.txt"

[stocks_interface]
active = "ig_interface"
values = ["yfinance", "alpha_vantage", "ig_interface"]

# YFinance API settings
[stocks_interface.yfinance]
api_timeout = 0.5

# Alpha Vantage API settings
[stocks_interface.alpha_vantage]
api_timeout = 12

# IG Interface settings
[stocks_interface.ig_interface]
order_type = "MARKET"
order_size = 10
order_expiry = "DFB"
order_currency = "GBP"
order_force_open = true
use_g_stop = false
use_demo_account = true
controlled_risk = false
api_timeout = 3

[account_interface]
active = "ig_interface"
values = ["yfinance", "alpha_vantage", "ig_interface"]

[strategies]
active = "intraday_gold"
values = ["simple_macd", "weighted_avg_peak", "simple_boll_bands", "smart_sentiment", "advanced_momentum", "simplicity", "intraday_gold", "strategy_manager"]

# Strategy Manager settings
[strategies.strategy_manager]
switch_to_simplicity_time = "14:30"
switch_back_time = "16:00"

# Simplicity strategy settings
[strategies.simplicity]
first_candle_start_time = "14:30"
first_candle_end_time = "15:00"
risk_reward_ratio = 2.0
min_volume_threshold = 1000
fvg_confirmation_candles = 3
stop_loss_buffer = 0.5
lookback_candles = 10

# Simple MACD strategy settings
[strategies.simple_macd]
max_spread_perc = 5
limit_perc = 10
stop_perc = 5

# Weighted Average Peak strategy settings
[strategies.weighted_avg_peak]
max_spread = 3
limit_perc = 10
stop_perc = 5

# Simple Bollinger Bands strategy settings
[strategies.simple_boll_bands]
window = 60
limit_perc = 10
stop_perc = 5

# Smart Sentiment strategy settings
[strategies.smart_sentiment]
window = 30
limit_perc = 1.2
stop_perc = 0.8

# Advanced Momentum strategy settings
[strategies.advanced_momentum]
# Entry Signal Parameters
fast_length = 12
slow_length = 26
signal_smoothing = 9

# Exit Strategy Parameters
atr_length = 14
base_risk_multiplier = 1.5
risk_reward_ratio = 2.5
force_exit_squeeze = true

# Trend Filter Parameters
use_long_trend = true
use_short_trend = true
ma_length = 100

# RSI Parameters
rsi_length = 14
rsi_long_boundary = 50
rsi_short_boundary = 50

# ADX Parameters
use_adx_limiter = true
adx_length = 5
di_length = 5
adx_high_boundary = 50
adx_low_boundary = 20

# Volume Filter Parameters
use_volume_filter = false
volume_ma_length = 10

# Squeeze Parameters
bb_length = 20
bb_mult_factor = 1.0
kc_length = 20
kc_mult_factor = 1.5
use_true_range = true

# Intraday Gold strategy settings
[strategies.intraday_gold]
# Pattern detection parameters
engulfing_min_body_ratio = 0.6
pin_bar_min_tail_ratio = 0.7
pin_bar_max_body_ratio = 0.3
breakout_min_distance = 0.1
false_breakout_max_distance = 0.05

# Support & Resistance parameters
ema_period = 50
ema_period2 = 200
swing_lookback = 20
pivot_lookback = 1

# Risk Management
risk_reward_ratio = 2.5
atr_period = 14
trailing_stop_atr_multiplier = 1.5

# Volume confirmation
use_volume_filter = true
volume_multiplier = 1.2

# Time filters (London open to NY close)
trading_start_hour = 8
trading_end_hour = 16
