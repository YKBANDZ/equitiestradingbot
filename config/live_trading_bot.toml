# Percentage of account value to use
max_account_usable = 50
time_zone = "America/New_York"

# Path to the credentials file
credentials_filepath = "/Users/e1/Documents/equitiestradingbot/config/credentials/live_credentials.json"

# Seconds to wait for between each spin of the bot across all markets
spin_interval = 2

# Enable paper trading
paper_trading = false

[logging]
enable = true
log_filepath = "/Users/e1/Documents/equitiestradingbot/log/trading_bot_{timestamp}.log"
debug = true

[market_source]
active = "list"
values = ["list", "api", "watchlist"]
[market_source.epic_id_list]
filepath = "/Users/e1/Documents/equitiestradingbot/data/epics_ids.txt"

[stocks_interface]
active = "ig_interface"
values = ["yfinance", "alpha_vantage", "ig_interface"]

[stocks_interface.yfinance]
api_timeout = 0.5

[stocks_interface.alpha_vantage]
api_timeout = 12

[stocks_interface.ig_interface]
order_type = "MARKET"
order_size = 1
order_expiry = "DFB"
order_currency = "USD"
order_force_open = true
use_g_stop = false
use_demo_account = true
controlled_risk = false
api_timeout = 3

[account_interface]
active = "ig_interface"
values = ["yfinance", "alpha_vantage", "ig_interface"]

[strategies]
active = "simple_macd"
values = ["simple_macd", "weighted_avg_peak", "simple_boll_bands"]
[strategies.simple_macd]
max_spread_perc = 5
limit_perc = 10
stop_perc = 5
[strategies.weighted_avg_peak]
max_spread = 3
limit_perc = 10
stop_perc = 5
[strategies.simple_boll_bands]
window = 60
limit_perc = 10
stop_perc = 5
